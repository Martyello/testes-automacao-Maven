name: CI - Testes Unificados Agibank

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    name: "🧪 Execução de Testes Full Stack"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Instalar Chrome (para o módulo Web)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Executar todos os módulos
        run: mvn clean test
        continue-on-error: true

      - name: Unificar Resultados Allure
        if: always()
        run: |
           mkdir -p all-results
           echo "Buscando resultados nos módulos..."
           find . -type d -name "allure-results" -not -path "./all-results/*" -exec cp -r {}/. all-results/ \;
           echo "Arquivos coletados em all-results:"
           ls -R all-results

      - name: Carregar histórico do Allure (gh-pages)
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Allure Report Action
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: "all-results"
          gh_pages: gh-pages-dir
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy do Relatório para o GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history