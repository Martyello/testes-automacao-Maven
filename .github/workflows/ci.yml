name: CI - Testes Unificados Agibank

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    name: "🧪 Execução de Testes Full Stack"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Instalar Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Executar Automação (Web, API e Performance)
        run: |
         # 1. Roda Web e API
         mvn clean test -pl teste-blogdoagi,teste-dogapi
            
         # 2. Roda Performance de forma isolada e FORÇADA
         # O comando 'install' ajuda a consolidar as dependências do pai no ambiente do GitHub
         mvn clean install -DskipTests
         mvn verify -f teste-performance/pom.xml
        continue-on-error: true

      - name: Unificar Resultados Allure
        if: always()
        run: |
          mkdir -p all-results
          find . -type d -name "allure-results" -not -path "./all-results/*" -exec cp -r {}/. all-results/ \;

      - name: Carregar histórico do Allure (gh-pages)
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Allure Report Action
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure_report
        with:
          allure_results: "all-results"
          gh_pages: gh-pages-dir
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Integrar Relatório JMeter
        if: always()
        run: |
          # Busca o index.html em qualquer lugar (agora com o -f ele VAI existir)
          REPORT_HTML=$(find . -name "index.html" | grep "jmeter/reports" | head -n 1)
            
          if [ -n "$REPORT_HTML" ]; then
            REPORT_DIR=$(dirname "$REPORT_HTML")
            echo "Relatório JMeter localizado em: $REPORT_DIR"
            
            # Dá permissão total para não termos erro de 'Denied'
            sudo chmod -R 777 allure-history
            
            # INJEÇÃO CRÍTICA:
            # 1. Coloca na pasta numerada (ex: /43/performance)
            CURRENT_RUN=$(ls -t allure-history | grep -E '^[0-9]+$' | head -n 1)
            mkdir -p allure-history/$CURRENT_RUN/performance
            cp -r $REPORT_DIR/* allure-history/$CURRENT_RUN/performance/
            
            # 2. Coloca na RAIZ do deploy (para o link fixo funcionar)
            mkdir -p allure-history/performance
            cp -r $REPORT_DIR/* allure-history/performance/
            
            echo "Sucesso: Relatório disponível em /performance/ e /$CURRENT_RUN/performance/"
          else
            echo "Aviso: Pasta target/jmeter/reports não encontrada. Listando arquivos para debug:"
            find . -maxdepth 4 -name "target"
          fi

      - name: Deploy para GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history